resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.24.0
  flutter_riverpod: ^2.6.1
  geolocator: ^13.0.0
  go_router: ^14.8.1
